<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Arrow Out — a slither puzzle</title>
<meta name="theme-color" content="#ffffff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Arrow Out">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<style>
  :root{
    --cream:#ffffff;--cream-2:#f0f0f0;--ink:#1b1b1b;
    --arrow:#1b1b1b;--arrow-dark:#000000;--free:#1b1b1b;
    --title:#1b1b1b;--sub:#8a8a8a;--crash:#e23b3b;
    --drop:#e23b3b;--drop-empty:#d4d4d4;--track:#ececec;--shadow:rgba(0,0,0,.14);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{margin:0;background:var(--cream);color:var(--ink);
    font-family:ui-rounded,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;font-weight:800;
    display:flex;flex-direction:column;align-items:center;min-height:100dvh;overflow:hidden;
    overscroll-behavior:none;padding-top:env(safe-area-inset-top)}
  header{width:100%;max-width:720px;padding:14px 20px 6px;text-align:center}
  .title{color:var(--title);font-size:30px;font-weight:900;letter-spacing:.5px;line-height:1}
  .sub{color:var(--sub);font-size:18px;font-weight:900;margin-top:2px}
  .rule{width:100%;max-width:720px;height:2px;background:var(--track);margin:10px 0 0}
  .hud{width:100%;max-width:720px;display:flex;align-items:center;gap:14px;padding:12px 20px 4px}
  .drops{display:flex;gap:8px}
  .drop{width:26px;height:26px}.drop svg{width:100%;height:100%;display:block}
  .bar{flex:1;height:24px;background:var(--track);border-radius:20px;position:relative;overflow:hidden}
  .bar .fill{position:absolute;inset:0;width:0;background:linear-gradient(90deg,#34c759,#00c7be);border-radius:20px;transition:width .35s ease}
  .pct{font-size:19px;font-weight:900;min-width:50px;text-align:right}
  .meta{width:100%;max-width:720px;display:flex;justify-content:space-between;gap:12px;padding:2px 20px 4px;font-size:14px;color:#8a8a8a}
  .meta b{color:var(--ink)}
  .stage{position:relative;flex:1;width:100%;overflow:hidden;touch-action:none}
  #board{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}
  .body{fill:none;stroke:var(--arrow);stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
  .head{fill:none;stroke:var(--arrow);stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
  .hit{fill:none;stroke:transparent;stroke-linecap:round;stroke-linejoin:round;pointer-events:stroke}
  g.crash .body,g.crash .head{stroke:var(--crash)}
  @keyframes rainbow{0%{stroke:#ff3b30}17%{stroke:#ff9500}33%{stroke:#ffcc00}50%{stroke:#34c759}67%{stroke:#00c7be}83%{stroke:#5e5ce6}100%{stroke:#ff3b30}}
  g.free .body,g.free .head{animation:rainbow .5s linear infinite}
  g.hl .body,g.hl .head{stroke:#007aff}
  .zoombar{position:absolute;right:12px;bottom:12px;display:flex;flex-direction:column;gap:8px;z-index:5}
  .zbtn{width:44px;height:44px;border:none;border-radius:14px;background:var(--cream-2);color:var(--ink);
    font-size:22px;font-weight:900;line-height:1;cursor:pointer;box-shadow:0 3px 0 var(--shadow);
    display:flex;align-items:center;justify-content:center;touch-action:manipulation}
  .zbtn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--shadow)}
  .zhint{position:absolute;left:12px;bottom:14px;font-size:12px;font-weight:800;color:#b3b3b3;z-index:5;pointer-events:none;
    transition:opacity .5s ease}
  .controls{width:100%;max-width:720px;display:flex;gap:10px;padding:8px 20px calc(16px + env(safe-area-inset-bottom));flex-wrap:wrap;justify-content:center}
  button.btn{font-family:inherit;font-weight:900;font-size:16px;border:none;cursor:pointer;padding:12px 18px;border-radius:16px;color:var(--ink);background:var(--cream-2);box-shadow:0 3px 0 var(--shadow);transition:transform .08s,box-shadow .08s}
  button.btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--shadow)}
  button.btn.on{background:var(--ink);color:#fff;box-shadow:0 3px 0 #000}
  button.btn.primary{background:var(--crash);color:#fff;box-shadow:0 3px 0 #a02a2a}
  button.btn:focus-visible{outline:3px solid #007aff;outline-offset:2px}
  .seg{display:flex;gap:8px}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:20;padding:24px}
  .overlay.show{display:flex}
  .card{background:#fff;border-radius:26px;padding:28px 26px;max-width:360px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .card h2{margin:0 0 4px;font-size:28px;font-weight:900}
  .card h2.win{color:var(--ink)}.card h2.lose{color:var(--crash)}
  .stars{font-size:34px;letter-spacing:6px;margin:8px 0 4px;color:#f5b400}
  .card p{margin:6px 0 18px;font-size:16px;color:#6a6a6a;font-weight:700}
  .card .row{display:flex;gap:10px;justify-content:center}
</style>
</head>
<body>
  <header>
    <div class="title">Arrow Out</div>
    <div class="sub" id="diffLabel">Easy</div>
  </header>
  <div class="rule"></div>
  <div class="hud">
    <div class="drops" id="drops" aria-label="strikes remaining"></div>
    <div class="bar"><div class="fill" id="fill"></div></div>
    <div class="pct" id="pct">0%</div>
  </div>
  <div class="meta">
    <span>Time <b id="time">0:00</b></span>
    <span>Freed <b id="freed">0</b>/<b id="total">0</b></span>
    <span>Best <b id="best">—</b></span>
  </div>
  <div class="stage">
    <svg id="board" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="zhint" id="zhint">pinch or drag to zoom</div>
    <div class="zoombar">
      <button class="zbtn" id="zin" aria-label="Zoom in">+</button>
      <button class="zbtn" id="zout" aria-label="Zoom out">–</button>
      <button class="zbtn" id="zfit" aria-label="Fit board" style="font-size:18px">⤢</button>
    </div>
  </div>
  <div class="controls">
    <div class="seg">
      <button class="btn on" data-diff="easy">Easy</button>
      <button class="btn" data-diff="medium">Medium</button>
      <button class="btn" data-diff="hard">Hard</button>
      <button class="btn" data-diff="veryHard">Very Hard</button>
      <button class="btn" data-diff="extreme">Extreme</button>
    </div>
    <button class="btn" id="hintBtn">Show free</button>
    <button class="btn primary" id="newBtn">New level</button>
  </div>
  <div class="overlay" id="overlay"><div class="card">
    <h2 id="ovTitle"></h2><div class="stars" id="ovStars"></div><p id="ovText"></p>
    <div class="row"><button class="btn" id="ovRetry">Try again</button><button class="btn primary" id="ovNext">New level</button></div>
  </div></div>

<script>
"use strict";
const SVGNS="http://www.w3.org/2000/svg";
const store=(()=>{let ok=false;try{const k='__t';localStorage.setItem(k,'1');localStorage.removeItem(k);ok=true;}catch(e){}const mem={};
  return{get:k=>{try{return ok?localStorage.getItem(k):(mem[k]??null);}catch(e){return mem[k]??null;}},
         set:(k,v)=>{try{ok?localStorage.setItem(k,v):(mem[k]=v);}catch(e){mem[k]=v;}}};})();

const DIRS={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
const DK=Object.keys(DIRS);
const OPP={up:"down",down:"up",left:"right",right:"left"};
const DIFF={
  easy:{cols:12,rows:16,minLen:3,lo:5,longFrac:.28,curve:.78,candidates:6,label:"Easy"},
  medium:{cols:16,rows:21,minLen:3,lo:6,longFrac:.30,curve:.72,candidates:7,label:"Medium"},
  hard:{cols:20,rows:26,minLen:3,lo:8,longFrac:.34,curve:.62,candidates:8,label:"Hard"},
  veryHard:{cols:24,rows:31,minLen:3,lo:9,longFrac:.38,curve:.55,candidates:8,label:"Very Hard"},
  extreme:{cols:28,rows:38,minLen:3,lo:10,longFrac:.42,curve:.48,candidates:9,label:"Extreme"}
};
const MAX_STRIKES=3;
const CELL=44;          // fixed board-space cell size; zoom is handled by the SVG viewBox
// arrow look — tweak freely
const STROKE_F=0.185;   // shaft thickness as fraction of a cell
const HEAD_LEN=1.75;    // arrowhead length in stroke-widths
const HEAD_HW =1.25;    // arrowhead half-width in stroke-widths
const STUB    =0.55;    // shaft length for a single-cell arrow, in cells

let cols,rows,cell=CELL,strokeW,pieces,occ,elmap,pieceById,diff='easy';
let freed,total,strikes,running=false,animating=false,startT=0,timerId=null;
let BW=0,BH=0,vb={x:0,y:0,w:0,h:0},fitW=0,minW=0,userZoomed=false;   // view state
const board=document.getElementById('board');
const stage=document.querySelector('.stage');
const inb=(x,y)=>x>=0&&x<cols&&y>=0&&y<rows;

/* ---------- generation (reverse construction -> always solvable) ---------- */
function rayClearGen(x,y,dir){const[dx,dy]=DIRS[dir];let cx=x+dx,cy=y+dy;
  while(inb(cx,cy)){if(occ[cy][cx]!==-1)return false;cx+=dx;cy+=dy;}return true;}
function onRay(hx,hy,dir,x,y){const[dx,dy]=DIRS[dir];let cx=hx+dx,cy=hy+dy;
  while(inb(cx,cy)){if(cx===x&&cy===y)return true;cx+=dx;cy+=dy;}return false;}
function occCount(){let n=0;for(let y=0;y<rows;y++)for(let x=0;x<cols;x++)if(occ[y][x]!==-1)n++;return n;}
function depthOf(x,y){return Math.min(x,y,cols-1-x,rows-1-y);}
function orderedCells(){
  const cells=[];
  for(let y=0;y<rows;y++)for(let x=0;x<cols;x++)cells.push([x,y,depthOf(x,y)+Math.random()*.35]);
  cells.sort((a,b)=>b[2]-a[2]);
  return cells.map(([x,y])=>[x,y]);
}
function pickWeighted(opts){
  let sum=opts.reduce((a,o)=>a+o.w,0),r=Math.random()*sum;
  for(const o of opts){r-=o.w;if(r<=0)return o;}
  return opts[opts.length-1];
}
// Grow one snake: head at (hx,hy) pointing dir. First body cell sits straight behind the head
// (inline arrowhead), then a weighted walk that favours bends. Stops at target length or when stuck.
function growSnake(hx,hy,dir,target){
  const cells=[[hx,hy]];
  const bx=hx-DIRS[dir][0],by=hy-DIRS[dir][1];
  if(!(inb(bx,by)&&occ[by][bx]===-1))return cells;   // no inline room -> length 1 (rejected below minLen)
  cells.push([bx,by]);let cx=bx,cy=by,last=OPP[dir];
  if(target>=3){                                    // second straight cell -> two collinear cells behind the head
    const b2x=bx-DIRS[dir][0],b2y=by-DIRS[dir][1];
    if(inb(b2x,b2y)&&occ[b2y][b2x]===-1){cells.push([b2x,b2y]);cx=b2x;cy=b2y;}
    else return cells;                              // only one straight cell available -> stay length 2 (rejected if <minLen)
  }
  while(cells.length<target){
    const opts=[];
    for(const nd of DK){
      if(nd===OPP[last])continue;                     // no immediate reversal
      const[dx,dy]=DIRS[nd],nx=cx+dx,ny=cy+dy;
      if(!inb(nx,ny)||occ[ny][nx]!==-1)continue;
      if(cells.some(([ex,ey])=>ex===nx&&ey===ny))continue;
      if(onRay(hx,hy,dir,nx,ny))continue;             // never cross the head's own escape ray
      const turn=nd===last?1:2.4;                     // favour turns -> windier snakes
      const compact=1+depthOf(nx,ny)*0.15;            // lean toward the interior
      opts.push({nx,ny,nd,w:turn*compact});
    }
    if(!opts.length)break;
    const next=pickWeighted(opts);
    cells.push([next.nx,next.ny]);cx=next.nx;cy=next.ny;last=next.nd;
  }
  return cells;
}
function targetLength(cfg){
  const physical=cols*rows;
  const softMax=Math.max(cfg.lo+1,Math.floor(physical*(cfg.longFrac||.35)));
  const span=Math.max(1,softMax-cfg.lo+1);
  return cfg.lo+Math.floor(Math.pow(Math.random(),cfg.curve||.65)*span);
}
// Single-phase reverse-placement: every placed piece has a clear escape ray over the pieces already
// down, so removing them in reverse order always solves. The candidate scorer below favors dense
// boards with long snakes and rejects the old failure mode: a field of mostly two-cell arrows.
function attemptGenerate(){
  const cfg=DIFF[diff];cols=cfg.cols;rows=cfg.rows;
  occ=Array.from({length:rows},()=>Array(cols).fill(-1));pieces=[];
  let id=0,placedAny=true;
  while(placedAny){
    placedAny=false;
    const order=orderedCells();
    for(const[hx,hy]of order){
      if(occ[hy][hx]!==-1)continue;
      const dirs=DK.filter(d=>rayClearGen(hx,hy,d));
      if(!dirs.length)continue;
      dirs.sort(()=>Math.random()-0.5);
      for(const dir of dirs){
        const target=targetLength(cfg);
        const cells=growSnake(hx,hy,dir,target);
        if(cells.length>=cfg.minLen){
          for(const[x,y]of cells)occ[y][x]=id;
          pieces.push({id,cells,dir,hx,hy,alive:true});id++;
          placedAny=true;break;
        }
      }
    }
  }
  total=pieces.length;
}
function boardScore(){
  const filled=occCount(),density=filled/(cols*rows);
  let len2=0,len3=0,longCells=0,sum=0,maxLen=0;
  for(const p of pieces){
    const L=p.cells.length;
    sum+=L;maxLen=Math.max(maxLen,L);
    if(L===2)len2++;
    if(L===3)len3++;
    if(L>=8)longCells+=L;
  }
  const avg=sum/(pieces.length||1);
  return density*1000+avg*22+maxLen*1.8+(longCells/(filled||1))*130-len2*220-len3*9;
}
function cloneBoard(){
  return {
    cols,rows,total,
    pieces:pieces.map(p=>({id:p.id,cells:p.cells.map(c=>[c[0],c[1]]),dir:p.dir,hx:p.hx,hy:p.hy,alive:true})),
    occ:occ.map(r=>r.slice())
  };
}
function restoreBoard(b){
  cols=b.cols;rows=b.rows;total=b.total;
  pieces=b.pieces.map(p=>({id:p.id,cells:p.cells.map(c=>[c[0],c[1]]),dir:p.dir,hx:p.hx,hy:p.hy,alive:true}));
  occ=b.occ.map(r=>r.slice());
}
function generate(){
  const cfg=DIFF[diff];let best=null,bestScore=-Infinity;
  for(let i=0;i<(cfg.candidates||5);i++){
    attemptGenerate();
    const score=boardScore();
    if(score>bestScore){bestScore=score;best=cloneBoard();}
  }
  restoreBoard(best);
}
/* piece is free iff head's forward ray clear of OTHER live pieces; returns gap (empty cells ahead) */
function freeInfo(p){const[dx,dy]=DIRS[p.dir];let cx=p.hx+dx,cy=p.hy+dy,gap=0;
  while(inb(cx,cy)){const o=occ[cy][cx];if(o!==-1&&o!==p.id)return{free:false,gap};gap++;cx+=dx;cy+=dy;}
  return{free:true,gap};}

/* ---------- geometry ---------- */
const ctr=(x,y)=>[x*cell+cell/2,y*cell+cell/2];
function polyLen(pts){let L=0;for(let i=1;i<pts.length;i++)L+=Math.hypot(pts[i][0]-pts[i-1][0],pts[i][1]-pts[i-1][1]);return L;}
function buildTrack(p){
  const[dx,dy]=DIRS[p.dir];
  let bc=p.cells.map(([x,y])=>ctr(x,y));            // head first
  if(bc.length===1)bc=[bc[0],[bc[0][0]-dx*cell*STUB,bc[0][1]-dy*cell*STUB]]; // stub tail
  const tailToHead=[...bc].reverse();               // tail..head
  const head=bc[0];const fwd=[];const K=cols+rows+2;
  for(let k=1;k<=K;k++)fwd.push([head[0]+dx*cell*k,head[1]+dy*cell*k]);
  const track=tailToHead.concat(fwd);
  const cum=[0];for(let i=1;i<track.length;i++)cum.push(cum[i-1]+Math.hypot(track[i][0]-track[i-1][0],track[i][1]-track[i-1][1]));
  p._t={track,cum,bodyArc:polyLen(tailToHead),total:cum[cum.length-1]};
}
function ptAt(p,a){const{track,cum,total}=p._t;a=Math.max(0,Math.min(total,a));
  for(let i=1;i<cum.length;i++){if(cum[i]>=a){const t=(a-cum[i-1])/((cum[i]-cum[i-1])||1);
    return[track[i-1][0]+(track[i][0]-track[i-1][0])*t,track[i-1][1]+(track[i][1]-track[i-1][1])*t];}}
  return track[track.length-1];}
function windowPts(p,ws,we){const{track,cum,total}=p._t;
  ws=Math.max(0,Math.min(total,ws));we=Math.max(0,Math.min(total,we));
  const pts=[ptAt(p,ws)];for(let i=0;i<cum.length;i++)if(cum[i]>ws&&cum[i]<we)pts.push(track[i]);pts.push(ptAt(p,we));return pts;}
const polyD=pts=>pts.map((q,i)=>(i?'L':'M')+q[0].toFixed(1)+' '+q[1].toFixed(1)).join(' ');
function chevronD(tip,dir){const[dx,dy]=DIRS[dir];const hl=strokeW*HEAD_LEN,hw=strokeW*HEAD_HW;
  const bx=tip[0]-dx*hl,by=tip[1]-dy*hl,nx=-dy,ny=dx;
  const l=[bx+nx*hw,by+ny*hw],r=[bx-nx*hw,by-ny*hw];
  return`M${l[0].toFixed(1)} ${l[1].toFixed(1)} L${tip[0].toFixed(1)} ${tip[1].toFixed(1)} L${r[0].toFixed(1)} ${r[1].toFixed(1)}`;}
function drawPiece(p,s){const we=p._t.bodyArc+s,ws=we-p._t.bodyArc;
  const bodyWe=Math.max(ws+0.1,we-strokeW*0.7);          // stop shaft just short of the tip
  const d=polyD(windowPts(p,ws,bodyWe));const tip=ptAt(p,we);
  const e=elmap.get(p.id);e.body.setAttribute('d',d);e.hit.setAttribute('d',polyD(windowPts(p,ws,we)));
  e.head.setAttribute('d',chevronD(tip,p.dir));}

/* ---------- render ---------- */
function render(){
  BW=cols*cell;BH=rows*cell;
  while(board.firstChild)board.removeChild(board.firstChild);
  elmap=new Map();pieceById=new Map();
  strokeW=Math.max(3,cell*STROKE_F);const sw=strokeW;
  const gBody=document.createElementNS(SVGNS,'g'),gHit=document.createElementNS(SVGNS,'g');
  for(const p of pieces){
    if(!p.alive)continue;buildTrack(p);pieceById.set(p.id,p);
    const g=document.createElementNS(SVGNS,'g');g.dataset.id=p.id;
    const body=document.createElementNS(SVGNS,'path');body.setAttribute('class','body');body.style.strokeWidth=sw;
    const head=document.createElementNS(SVGNS,'path');head.setAttribute('class','head');head.style.strokeWidth=sw;
    g.appendChild(body);g.appendChild(head);gBody.appendChild(g);
    const hit=document.createElementNS(SVGNS,'path');hit.setAttribute('class','hit');hit.style.strokeWidth=cell*0.82;
    hit.dataset.id=p.id;gHit.appendChild(hit);
    elmap.set(p.id,{g,body,head,hit});
    drawPiece(p,0);
  }
  board.appendChild(gBody);board.appendChild(gHit);
  if(!vb.w){vb={x:0,y:0,w:BW,h:BH};}
  board.setAttribute('viewBox',`0 0 ${BW} ${BH}`);
}

/* ---------- zoom & pan (SVG viewBox) ---------- */
const rectOf=()=>board.getBoundingClientRect();
const aspect=()=>{const r=rectOf();return (r.width>0&&r.height>0)?r.width/r.height:0.6;};
const applyView=()=>board.setAttribute('viewBox',`${vb.x.toFixed(2)} ${vb.y.toFixed(2)} ${vb.w.toFixed(2)} ${vb.h.toFixed(2)}`);
function calcFitW(){const a=aspect(),pad=1.06;return (BW/BH>=a)?BW*pad:(BH*pad)*a;}
function fitView(){const a=aspect();fitW=calcFitW();minW=Math.min(fitW,6.5*cell);
  vb.w=fitW;vb.h=vb.w/a;vb.x=(BW-vb.w)/2;vb.y=(BH-vb.h)/2;userZoomed=false;applyView();}
function clampView(){const a=aspect();
  vb.w=Math.max(minW,Math.min(fitW,vb.w));vb.h=vb.w/a;
  vb.x=(vb.w>=BW)?(BW-vb.w)/2:Math.max(0,Math.min(BW-vb.w,vb.x));
  vb.y=(vb.h>=BH)?(BH-vb.h)/2:Math.max(0,Math.min(BH-vb.h,vb.y));
  applyView();}
const bX=sx=>{const r=rectOf();return vb.x+(sx-r.left)*vb.w/r.width;};
const bY=sy=>{const r=rectOf();return vb.y+(sy-r.top)*vb.h/r.height;};
function panKeep(p,sx,sy){const r=rectOf();vb.x=p.x-(sx-r.left)*vb.w/r.width;vb.y=p.y-(sy-r.top)*vb.h/r.height;}
function zoomAt(f,sx,sy){const p={x:bX(sx),y:bY(sy)};vb.w=Math.max(minW,Math.min(fitW,vb.w/f));vb.h=vb.w/aspect();
  panKeep(p,sx,sy);userZoomed=true;hideHint();clampView();}
function zoomCenter(f){const r=rectOf();zoomAt(f,r.left+r.width/2,r.top+r.height/2);}
let hintGone=false;function hideHint(){if(hintGone)return;hintGone=true;const h=document.getElementById('zhint');if(h)h.style.opacity='0';}

const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const gp=new Map();let grab=null,tap=null,pinch=null,lastTap=0,lastXY=null;
function handleTap(sx,sy){
  const now=performance.now();
  if(now-lastTap<300&&lastXY&&Math.hypot(sx-lastXY.x,sy-lastXY.y)<32){   // double-tap toggles zoom
    lastTap=0;hideHint();(vb.w>fitW*0.7)?zoomAt(2.4,sx,sy):fitView();return;}
  lastTap=now;lastXY={x:sx,y:sy};
  if(!running||animating)return;
  const el=document.elementFromPoint(sx,sy);const id=el&&el.dataset?el.dataset.id:null;
  if(id!=null&&pieceById.has(+id))onClick(pieceById.get(+id));
}
board.addEventListener('pointerdown',e=>{
  board.setPointerCapture(e.pointerId);gp.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(gp.size===1){grab={x:bX(e.clientX),y:bY(e.clientY)};tap={x:e.clientX,y:e.clientY,t:performance.now(),moved:false};pinch=null;}
  else if(gp.size===2){const[a,b]=[...gp.values()];pinch={d:dist(a,b)};tap=null;hideHint();}
});
board.addEventListener('pointermove',e=>{
  if(!gp.has(e.pointerId))return;gp.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(gp.size>=2&&pinch){const[a,b]=[...gp.values()];const nd=dist(a,b),mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
    if(pinch.d>0)zoomAt(nd/pinch.d,mx,my);pinch.d=nd;return;}
  if(gp.size===1&&grab){if(tap&&Math.hypot(e.clientX-tap.x,e.clientY-tap.y)>8){tap.moved=true;hideHint();}
    panKeep(grab,e.clientX,e.clientY);clampView();}
});
function endPtr(e){
  const wasTap=gp.size===1&&tap&&!tap.moved&&(performance.now()-tap.t<500);
  const tx=tap?tap.x:e.clientX,ty=tap?tap.y:e.clientY;
  gp.delete(e.pointerId);
  if(wasTap)handleTap(tx,ty);
  if(gp.size===1){const o=[...gp.values()][0];grab={x:bX(o.x),y:bY(o.y)};tap=null;pinch=null;}
  else if(gp.size===0){grab=null;tap=null;pinch=null;}
  else if(gp.size>=2){const[a,b]=[...gp.values()];pinch={d:dist(a,b)};}
}
board.addEventListener('pointerup',endPtr);
board.addEventListener('pointercancel',endPtr);
stage.addEventListener('wheel',e=>{e.preventDefault();zoomAt(e.deltaY<0?1.12:1/1.12,e.clientX,e.clientY);},{passive:false});
document.getElementById('zin').addEventListener('click',()=>zoomCenter(1.45));
document.getElementById('zout').addEventListener('click',()=>zoomCenter(1/1.45));
document.getElementById('zfit').addEventListener('click',fitView);

/* ---------- animation ---------- */
const easeOut=t=>1-Math.pow(1-t,2.2);
const reduce=()=>matchMedia('(prefers-reduced-motion: reduce)').matches;
function animate(dur,step,done){const t0=performance.now();
  (function frame(now){let t=Math.min(1,(now-t0)/dur);step(t);if(t<1)requestAnimationFrame(frame);else done&&done();})(performance.now());}

function onClick(p){
  if(!running||animating||!p.alive)return;
  if(!startT)startTimer();
  const info=freeInfo(p);
  if(info.free){
    for(const[x,y]of p.cells)occ[y][x]=-1;   // vacate immediately for others
    p.alive=false;animating=true;
    const el=elmap.get(p.id);el.g.classList.add('free');el.hit.style.pointerEvents='none';
    const dist=p._t.total-p._t.bodyArc;
    if(reduce()){el.g.remove();el.hit.remove();animating=false;afterFree();return;}
    const dur=Math.max(240,Math.min(620,dist*7));
    animate(dur,t=>drawPiece(p,easeOut(t)*(p._t.total+2)),()=>{el.g.remove();el.hit.remove();animating=false;afterFree();});
  }else{
    strikes++;drawDrops();animating=true;
    const el=elmap.get(p.id);const adv=info.gap*cell+cell*0.34;
    if(reduce()){el.g.classList.add('crash');setTimeout(()=>el.g.classList.remove('crash'),420);animating=false;afterStrike();return;}
    animate(150,t=>drawPiece(p,easeOut(t)*adv),()=>{
      el.g.classList.add('crash');
      animate(230,t=>drawPiece(p,adv*(1-t)),()=>{
        setTimeout(()=>el.g.classList.remove('crash'),160);animating=false;afterStrike();});
    });
  }
}
function afterFree(){freed++;updateHUD();if(freed>=total)win();}
function afterStrike(){if(strikes>=MAX_STRIKES)lose();}

/* ---------- hud / timer ---------- */
function drawDrops(){const d=document.getElementById('drops');d.innerHTML='';
  for(let i=0;i<MAX_STRIKES;i++){const spent=i<strikes;const w=document.createElement('div');w.className='drop';
    w.innerHTML=`<svg viewBox="0 0 24 24"><path d="M12 21 C12 21 3 14.5 3 8.6 A4.6 4.6 0 0 1 12 6 A4.6 4.6 0 0 1 21 8.6 C21 14.5 12 21 12 21 Z" fill="${spent?'var(--drop-empty)':'var(--drop)'}"/></svg>`;
    d.appendChild(w);}}
function updateHUD(){const pct=total?Math.round(100*freed/total):0;
  document.getElementById('pct').textContent=pct+'%';document.getElementById('fill').style.width=pct+'%';
  document.getElementById('freed').textContent=freed;document.getElementById('total').textContent=total;}
function fmt(ms){const s=Math.floor(ms/1000);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function startTimer(){startT=performance.now();timerId=setInterval(()=>document.getElementById('time').textContent=fmt(performance.now()-startT),250);}
function stopTimer(){if(timerId){clearInterval(timerId);timerId=null;}}
function bestKey(){return'arrowout_best_'+diff;}
function showBest(){const b=store.get(bestKey());document.getElementById('best').textContent=b?fmt(Number(b)):'—';}

/* ---------- end states ---------- */
function win(){running=false;stopTimer();const el=startT?performance.now()-startT:0;
  const s=Math.max(1,3-strikes);const prev=store.get(bestKey());const isBest=el>0&&(!prev||el<Number(prev));
  if(isBest)store.set(bestKey(),String(Math.round(el)));showBest();
  overlay('win','Solved!','★★★'.slice(0,s)+'☆☆☆'.slice(0,3-s),
    `${fmt(el)} · ${strikes} strike${strikes===1?'':'s'}${isBest?' · new best!':''}`);}
function lose(){running=false;stopTimer();overlay('lose','Out of tries','',`You freed ${freed} of ${total}. Read the free arrows first.`);}
function overlay(kind,title,stars,text){document.getElementById('ovTitle').textContent=title;
  document.getElementById('ovTitle').className=kind;document.getElementById('ovStars').textContent=stars;
  document.getElementById('ovText').textContent=text;document.getElementById('overlay').classList.add('show');}

/* ---------- lifecycle ---------- */
let savedPieces=null;
function snapshot(){savedPieces=pieces.map(p=>({id:p.id,dir:p.dir,hx:p.hx,hy:p.hy,cells:p.cells.map(c=>[c[0],c[1]])}));}
function restoreSaved(){
  const cfg=DIFF[diff];cols=cfg.cols;rows=cfg.rows;
  occ=Array.from({length:rows},()=>Array(cols).fill(-1));
  pieces=savedPieces.map(p=>({id:p.id,dir:p.dir,hx:p.hx,hy:p.hy,cells:p.cells.map(c=>[c[0],c[1]]),alive:true}));
  for(const p of pieces)for(const[x,y]of p.cells)occ[y][x]=p.id;
  total=pieces.length;
}
function startPlay(){
  freed=0;strikes=0;startT=0;running=true;
  document.getElementById('time').textContent='0:00';
  drawDrops();updateHUD();showBest();
  gp.clear();grab=tap=pinch=null;vb.w=0;
  render();
  requestAnimationFrame(fitView);
}
function newLevel(){
  document.getElementById('overlay').classList.remove('show');animating=false;
  document.getElementById('diffLabel').textContent=DIFF[diff].label;
  let genTries=0;
  do{generate();genTries++;}while(genTries<4&&total<8);
  snapshot();
  startPlay();
}
function restartSame(){                          // replay the identical board (used after 3 strikes)
  if(!savedPieces){newLevel();return;}
  document.getElementById('overlay').classList.remove('show');animating=false;
  restoreSaved();
  startPlay();
}
function hint(){if(!running||animating)return;
  for(const p of pieces){if(p.alive&&freeInfo(p).free){const g=elmap.get(p.id).g;g.classList.add('hl');setTimeout(()=>g.classList.remove('hl'),1000);}}}

document.querySelectorAll('[data-diff]').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('[data-diff]').forEach(x=>x.classList.remove('on'));b.classList.add('on');
  diff=b.dataset.diff;stopTimer();newLevel();}));
document.getElementById('newBtn').addEventListener('click',()=>{stopTimer();newLevel();});
document.getElementById('ovNext').addEventListener('click',()=>{stopTimer();newLevel();});
document.getElementById('ovRetry').addEventListener('click',()=>{stopTimer();restartSame();});
document.getElementById('hintBtn').addEventListener('click',hint);
let rt;addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>{
  if(!vb.w)return;
  if(userZoomed){fitW=calcFitW();minW=Math.min(fitW,6.5*cell);clampView();}else fitView();
},150);});
if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
newLevel();
</script>
</body>
</html>
