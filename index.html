<!DOCTYPE html>
<html lang="en">
<head>

<style>
  :root{
    --cream:#ffffff;--cream-2:#f0f0f0;--ink:#1b1b1b;
    --arrow:#1b1b1b;--arrow-dark:#000000;--free:#1b1b1b;
    --title:#1b1b1b;--sub:#8a8a8a;--crash:#e23b3b;
    --drop:#e23b3b;--drop-empty:#d4d4d4;--track:#ececec;--shadow:rgba(0,0,0,.14);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{margin:0;background:var(--cream);color:var(--ink);
    font-family:ui-rounded,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;font-weight:800;
    display:flex;flex-direction:column;align-items:center;min-height:100dvh;overflow:hidden;
    overscroll-behavior:none;padding-top:env(safe-area-inset-top)}
  header{width:100%;max-width:720px;padding:14px 20px 6px;text-align:center}
  .title{color:var(--title);font-size:30px;font-weight:900;letter-spacing:.5px;line-height:1}
  .sub{color:var(--sub);font-size:18px;font-weight:900;margin-top:2px}
  .rule{width:100%;max-width:720px;height:2px;background:var(--track);margin:10px 0 0}
  .hud{width:100%;max-width:720px;display:flex;align-items:center;gap:14px;padding:12px 20px 4px}
  .drops{display:flex;gap:8px}
  .drop{width:26px;height:26px}.drop svg{width:100%;height:100%;display:block}
  .bar{flex:1;height:24px;background:var(--track);border-radius:20px;position:relative;overflow:hidden}
  .bar .fill{position:absolute;inset:0;width:0;background:linear-gradient(90deg,#34c759,#00c7be);border-radius:20px;transition:width .35s ease}
  .pct{font-size:19px;font-weight:900;min-width:50px;text-align:right}
  .meta{width:100%;max-width:720px;display:flex;justify-content:space-between;gap:12px;padding:2px 20px 4px;font-size:14px;color:#8a8a8a}
  .meta b{color:var(--ink)}
  .stage{position:relative;flex:1;min-height:0;width:100%;overflow:hidden;touch-action:none}
  #board{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}
  .body{fill:none;stroke:var(--arrow);stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
  .head{fill:none;stroke:var(--arrow);stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
  .hit{fill:none;stroke:transparent;stroke-linecap:round;stroke-linejoin:round;pointer-events:stroke}
  g.crash .body,g.crash .head{stroke:var(--crash)}
  @keyframes rainbow{0%{stroke:#ff3b30}17%{stroke:#ff9500}33%{stroke:#ffcc00}50%{stroke:#34c759}67%{stroke:#00c7be}83%{stroke:#5e5ce6}100%{stroke:#ff3b30}}
  g.free .body,g.free .head{animation:rainbow .5s linear infinite}
  g.hl .body,g.hl .head{stroke:#007aff}
  .zoombar{display:flex;gap:8px;justify-content:center}
  .zbtn{width:44px;height:44px;border:none;border-radius:14px;background:var(--cream-2);color:var(--ink);
    font-size:22px;font-weight:900;line-height:1;cursor:pointer;box-shadow:0 3px 0 var(--shadow);
    display:flex;align-items:center;justify-content:center;touch-action:manipulation}
  .zbtn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--shadow)}
  .busy{position:absolute;inset:0;display:none;flex-direction:column;gap:12px;align-items:center;justify-content:center;
    background:rgba(255,255,255,.75);backdrop-filter:blur(2px);z-index:6;font-weight:800;color:#8a6a45}
  .busy.show{display:flex}
  .spin{width:28px;height:28px;border-radius:50%;border:4px solid #e5d5bd;border-top-color:#8a6a45;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .zhint{position:absolute;left:12px;bottom:8px;font-size:12px;font-weight:800;color:#b3b3b3;z-index:5;pointer-events:none;
    transition:opacity .5s ease}
  .controls{width:100%;max-width:720px;display:grid;gap:10px;padding:8px 20px calc(16px + env(safe-area-inset-bottom))}
  .controlRow,.actionRow{display:flex;gap:10px;justify-content:center;align-items:center}
  .controlRow{display:grid;grid-template-columns:minmax(0,1fr) auto}
  .selectWrap{height:44px;border-radius:14px;background:var(--cream-2);box-shadow:0 3px 0 var(--shadow);
    display:grid;grid-template-columns:auto minmax(0,1fr);align-items:center;gap:8px;padding:0 12px;color:#8a8a8a;font-size:12px;font-weight:900}
  .selectWrap select{min-width:0;width:100%;border:none;background:transparent;color:var(--ink);font:inherit;font-size:16px;font-weight:900;outline:none}
  button.btn{font-family:inherit;font-weight:900;font-size:16px;border:none;cursor:pointer;padding:12px 18px;border-radius:16px;color:var(--ink);background:var(--cream-2);box-shadow:0 3px 0 var(--shadow);transition:transform .08s,box-shadow .08s}
  button.btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--shadow)}
  button.btn.on{background:var(--ink);color:#fff;box-shadow:0 3px 0 #000}
  button.btn.primary{background:var(--crash);color:#fff;box-shadow:0 3px 0 #a02a2a}
  button.btn:focus-visible{outline:3px solid #007aff;outline-offset:2px}
  .actionRow .btn{flex:1;max-width:220px}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:20;padding:24px}
  .overlay.show{display:flex}
  .card{background:#fff;border-radius:26px;padding:28px 26px;max-width:360px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .card h2{margin:0 0 4px;font-size:28px;font-weight:900}
  .card h2.win{color:var(--ink)}.card h2.lose{color:var(--crash)}
  .stars{font-size:34px;letter-spacing:6px;margin:8px 0 4px;color:#f5b400}
  .card p{margin:6px 0 18px;font-size:16px;color:#6a6a6a;font-weight:700}
  .card .row{display:flex;gap:10px;justify-content:center}

<body>
  <header>
    <div class="title">Arrow Out</div>
    <div class="sub" id="diffLabel">Easy</div>
  </header>
  <div class="rule"></div>
  <div class="hud">
    <div class="drops" id="drops" aria-label="strikes remaining"></div>
    <div class="bar"><div class="fill" id="fill"></div></div>
    <div class="pct" id="pct">0%</div>
  </div>
  <div class="meta">
    <span>Time <b id="time">0:00</b></span>

  </div>
  <div class="stage">
    <svg id="board" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="zhint" id="zhint">pinch to zoom · drag to pan</div>
    <div class="busy" id="busy"><div class="spin"></div>Building board…</div>
  </div>
  <div class="controls">
    <div class="controlRow">
      <label class="selectWrap"><span>Difficulty</span>
        <select id="diffSelect" aria-label="Difficulty">

      <div class="zoombar" aria-label="Zoom controls">
      <button class="zbtn" id="zin" aria-label="Zoom in">+</button>
      <button class="zbtn" id="zout" aria-label="Zoom out">–</button>

    <h2 id="ovTitle"></h2><div class="stars" id="ovStars"></div><p id="ovText"></p>
    <div class="row"><button class="btn" id="ovRetry">Try again</button><button class="btn primary" id="ovNext">New level</button></div>
  </div></div>

<script type="text/plain" id="genSrc">
/* ---------- generation (reverse construction -> always solvable) ----------
   v18: doubled board sizes; tiered long-first packing.
   Long snakes are placed first while the board is open (they need the room),
   then successively shorter tiers densify the gaps, stopping in the 90-95% window.
   Hot paths use flat typed arrays (extreme is now 48x64 = 3072 cells). */
function rayClearGen(x,y,dir,mask){const[dx,dy]=DIRS[dir];let cx=x+dx,cy=y+dy;
  while(inb(cx,cy)){if(occ[cy][cx]!==-1||(mask&&mask[cy*cols+cx]))return false;cx+=dx;cy+=dy;}return true;}
function anyRayClear(x,y,mask){return DK.some(d=>rayClearGen(x,y,d,mask));}
let genFilled=0;
function depthOf(x,y){return Math.min(x,y,cols-1-x,rows-1-y);}
function orderedCells(){
  const cells=[];
  for(let y=0;y<rows;y++)for(let x=0;x<cols;x++)if(occ[y][x]===-1)cells.push([x,y,depthOf(x,y)+Math.random()*.35]);
  cells.sort((a,b)=>b[2]-a[2]);
  return cells;
}
function pickWeighted(opts){
  let sum=0;for(const o of opts)sum+=o.w;
  let r=Math.random()*sum;
  for(const o of opts){r-=o.w;if(r<=0)return o;}
  return opts[opts.length-1];
}
function dirBetween(a,b){
  const dx=b[0]-a[0],dy=b[1]-a[1];
  return DK.find(d=>DIRS[d][0]===dx&&DIRS[d][1]===dy)||null;
}
function sampleRunTarget(){
  const r=Math.random();
  if(r<.30)return 2;
  if(r<.55)return 3;
  if(r<.72)return 4;
  if(r<.84)return 5+Math.floor(Math.random()*2);
  if(r<.94)return 7+Math.floor(Math.random()*5);
  return Math.max(cols,rows);           // rare full-length corridor
}
function wallNeighbors(x,y,mask){
  let n=0;
  for(const d of DK){const nx=x+DIRS[d][0],ny=y+DIRS[d][1];
    if(!inb(nx,ny)||occ[ny][nx]!==-1||mask[ny*cols+nx])n++;}
  return n;
}
function placeableHead(x,y,mask){
  // a future piece can start here: some dir has a clear escape ray AND the
  // in-line back cell (needed for the straight-behind-head rule) is free
  for(const d of DK){
    if(!rayClearGen(x,y,d,mask))continue;
    const bx=x-DIRS[d][0],by=y-DIRS[d][1];
    if(inb(bx,by)&&occ[by][bx]===-1&&!mask[by*cols+bx])return true;
  }
  return false;
}
function componentsOK(mask,minComp){
  // every empty region left after this placement must stay fillable:
  // a 1-cell region needs a clear ray (stub arrow), bigger ones a placeable head
  const N=cols*rows,seen=new Uint8Array(N),stack=[];
  for(let i=0;i<N;i++){
    if(seen[i]||mask[i])continue;
    const y0=(i/cols)|0,x0=i%cols;
    if(occ[y0][x0]!==-1)continue;
    stack.length=0;stack.push(i);seen[i]=1;
    const comp=[];
    while(stack.length){
      const j=stack.pop();comp.push(j);
      const ay=(j/cols)|0,ax=j%cols;
      for(const d of DK){
        const nx=ax+DIRS[d][0],ny=ay+DIRS[d][1];
        if(nx<0||ny<0||nx>=cols||ny>=rows)continue;
        const k=ny*cols+nx;
        if(!seen[k]&&!mask[k]&&occ[ny][nx]===-1){seen[k]=1;stack.push(k);}
      }
    }
    if(comp.length<(minComp||1))return false;
    if(comp.length===1){
      if(!anyRayClear(comp[0]%cols,(comp[0]/cols)|0,mask))return false;
    }else if(!comp.some(j=>placeableHead(j%cols,(j/cols)|0,mask)))return false;
  }
  return true;
}
function growSnake(hx,hy,dir,target,minAccept,region){
  // the cell directly behind the head is mandatory and in line with dir:
  // >=1 straight body length behind the arrowhead before any elbow.
  const bx=hx-DIRS[dir][0],by=hy-DIRS[dir][1];
  const inRegion=(x,y)=>!region||region.has(y*cols+x);
  if(!(inb(bx,by)&&occ[by][bx]===-1&&inRegion(bx,by)))return null;
  // onion rule: bodies may not dip more than 1 layer shallower than the head.
  // Filling deepest-first keeps all shallower layers empty, so every future
  // outward escape ray stays clear by construction. (Repair mode is exempt.)
  const minDepth=region?0:Math.max(0,depthOf(hx,hy)-1);
  const N=cols*rows,minA=minAccept||2;
  const attempts=target>=60?3:target>=30?5:10;
  let best=null;
  for(let a=0;a<attempts;a++){
    const cells=[[hx,hy],[bx,by]];
    const mask=new Uint8Array(N);mask[hy*cols+hx]=1;mask[by*cols+bx]=1;
    let last=OPP[dir],run=1,runTarget=sampleRunTarget();
    let guard=0;
    while(cells.length<target&&guard++<Math.max(60,target*10)){
      const[cx,cy]=cells[cells.length-1],opts=[];
      for(const nd of DK){
        if(nd===OPP[last])continue;
        const nx=cx+DIRS[nd][0],ny=cy+DIRS[nd][1];
        if(!inb(nx,ny)||occ[ny][nx]!==-1||mask[ny*cols+nx])continue;
        if(region&&!region.has(ny*cols+nx))continue;
        if(depthOf(nx,ny)<minDepth)continue;
        let rhythm;
        if(nd===last) rhythm=run<runTarget?8.0:.25;
        else rhythm=run<runTarget?.3:8.0;
        // depth bias: pack the board center-out so remaining empty space stays
        // shallow with short outward escape rays (critical on doubled boards)
        const compact=1+depthOf(nx,ny)*.08;
        opts.push({nx,ny,nd,w:rhythm*(1+wallNeighbors(nx,ny,mask)*.9)*compact});
      }
      if(!opts.length){
        if(cells.length>2){const c=cells.pop();mask[c[1]*cols+c[0]]=0;
          last=cells.length>1?dirBetween(cells[cells.length-2],cells[cells.length-1]):OPP[dir];
          run=1;runTarget=sampleRunTarget();}
        else break;
        continue;
      }
      const next=pickWeighted(opts);
      if(next.nd===last)run++;else{run=1;runTarget=sampleRunTarget();}
      last=next.nd;
      cells.push([next.nx,next.ny]);mask[next.ny*cols+next.nx]=1;
    }
    if(cells.length>=minA){
      // lazy connectivity guard with a capped tail-trim retry
      let cand=cells;
      for(let t=0;t<4&&cand.length>=minA;t++){
        if(componentsOK(mask,region?1:3)){best=cand.map(c=>[c[0],c[1]]);break;}
        const c=cand[cand.length-1];mask[c[1]*cols+c[0]]=0;
        cand=cand.slice(0,cand.length-1);
      }
      if(best)break;
    }
  }
  return best;
}
let genNextId=0;
function placeGen(cells,dir,hx,hy){
  for(const[x,y]of cells)occ[y][x]=genNextId;
  genFilled+=cells.length;
  pieces.push({id:genNextId,cells,dir,hx,hy,alive:true});genNextId++;
}
function placePass(tier,goal){
  let placedAny=false;
  const N=cols*rows;
  for(const[hx,hy]of orderedCells()){
    if(genFilled/N>=goal)break;
    if(occ[hy][hx]!==-1)continue;
    const dirs=DK.filter(d=>rayClearGen(hx,hy,d));
    if(!dirs.length)continue;
    dirs.sort(()=>Math.random()-0.5);
    for(const dir of dirs){
      const target=tier.lo+Math.floor(Math.pow(Math.random(),.5)*(tier.hi-tier.lo+1));
      const cells=growSnake(hx,hy,dir,target,tier.min);
      if(cells){placeGen(cells,dir,hx,hy);placedAny=true;break;}
    }
  }
  return placedAny;
}
function emptyComponents(){
  const N=cols*rows,seen=new Uint8Array(N),comps=[];
  for(let i=0;i<N;i++){
    if(seen[i])continue;
    const y0=(i/cols)|0,x0=i%cols;
    if(occ[y0][x0]!==-1)continue;
    const stack=[i];seen[i]=1;const comp=[];
    while(stack.length){
      const j=stack.pop();comp.push([j%cols,(j/cols)|0]);
      const ay=(j/cols)|0,ax=j%cols;
      for(const d of DK){
        const nx=ax+DIRS[d][0],ny=ay+DIRS[d][1];
        if(nx<0||ny<0||nx>=cols||ny>=rows)continue;
        const k=ny*cols+nx;
        if(!seen[k]&&occ[ny][nx]===-1){seen[k]=1;stack.push(k);}
      }
    }
    comps.push(comp);
  }
  return comps;
}
function repairPass(stopAt){
  let guard=0;
  while(guard++<200){
    if(genFilled/(cols*rows)>=stopAt)return;
    const comps=emptyComponents();
    if(!comps.length)return;
    let progress=false;
    for(const comp of comps){
      const region=new Set(comp.map(([x,y])=>y*cols+x));
      const heads=comp.filter(([x,y])=>DK.some(d=>rayClearGen(x,y,d))).sort(()=>Math.random()-.5);
      let done=false;
      for(const[hx,hy]of heads){
        if(occ[hy][hx]!==-1)continue;
        const dirs=DK.filter(d=>rayClearGen(hx,hy,d)).sort(()=>Math.random()-.5);
        for(const dir of dirs){
          const cells=growSnake(hx,hy,dir,Math.min(comp.length,Math.round(DIFF[diff].maxLen*1.5)),2,region);
          if(cells){placeGen(cells,dir,hx,hy);progress=true;done=true;break;}
        }
        if(done)break;
      }
      if(!done){
        for(const[x,y]of comp){
          if(occ[y][x]!==-1)continue;
          const d=DK.find(dd=>rayClearGen(x,y,dd));
          if(!d)continue;
          const m=new Uint8Array(cols*rows);m[y*cols+x]=1;
          if(!componentsOK(m,1))continue;   // a stub must not kill another region's last head
          placeGen([[x,y]],d,x,y);progress=true;
        }
      }
    }
    if(!progress)return;
  }
}
function solvableNow(){
  const o=occ.map(r=>r.slice());
  const alive=new Set(pieces.map(p=>p.id));
  const isFree=p=>{const[dx,dy]=DIRS[p.dir];let cx=p.hx+dx,cy=p.hy+dy;
    while(inb(cx,cy)){const v=o[cy][cx];if(v!==-1&&v!==p.id)return false;cx+=dx;cy+=dy;}return true;};
  let removed=true;
  while(alive.size&&removed){
    removed=false;
    for(const p of pieces){
      if(!alive.has(p.id))continue;
      if(isFree(p)){for(const[x,y]of p.cells)o[y][x]=-1;alive.delete(p.id);removed=true;}
    }
  }
  return alive.size===0;
}
function tryAbsorb(x,y,strict){
  for(const d of DK){
    const nx=x+DIRS[d][0],ny=y+DIRS[d][1];
    if(!inb(nx,ny))continue;
    const id=occ[ny][nx];if(id===-1)continue;
    const p=pieces.find(q=>q.id===id);
    if(p.cells.length>=Math.round(DIFF[diff].maxLen*1.15))continue;  // no monster pieces
    const[tx,ty]=p.cells[p.cells.length-1];
    if(tx!==nx||ty!==ny)continue;               // must attach at the tail
    // for a 1-cell piece the tail IS the head: only allow the straight-behind cell
    if(p.cells.length===1&&(x!==p.hx-DIRS[p.dir][0]||y!==p.hy-DIRS[p.dir][1]))continue;
    if(strict){
      // absorbing this cell must not strand any remaining empty region
      const m=new Uint8Array(cols*rows);m[y*cols+x]=1;
      if(!componentsOK(m,1))continue;
    }
    p.cells.push([x,y]);occ[y][x]=id;
    if(solvableNow()){genFilled++;return true;}
    p.cells.pop();occ[y][x]=-1;
  }
  return false;
}
function mergeSingles(){
  let changed=true;
  while(changed){
    changed=false;
    const singles=pieces.filter(p=>p.cells.length===1);
    for(const a of singles){
      if(a.cells.length!==1)continue;
      const[ax,ay]=a.cells[0];
      for(const d of DK){
        const bx=ax+DIRS[d][0],by=ay+DIRS[d][1];
        if(!inb(bx,by))continue;
        const bId=occ[by][bx];if(bId===-1)continue;
        const b=pieces.find(q=>q.id===bId);
        if(!b||b.cells.length!==1||b===a)continue;
        for(const[head,tail]of[[a,b],[b,a]]){
          const[hx2,hy2]=head.cells[0],[tx2,ty2]=tail.cells[0];
          const nd=dirBetween([tx2,ty2],[hx2,hy2]);
          const savedDir=head.dir,savedCells=head.cells;
          head.dir=nd;head.cells=[[hx2,hy2],[tx2,ty2]];head.hx=hx2;head.hy=hy2;
          occ[ty2][tx2]=head.id;
          const idx=pieces.indexOf(tail);pieces.splice(idx,1);
          if(solvableNow()){changed=true;break;}
          pieces.splice(idx,0,tail);occ[ty2][tx2]=tail.id;
          head.dir=savedDir;head.cells=savedCells;
        }
        if(changed)break;
      }
      if(changed)break;
    }
  }
  total=pieces.length;
}
function absorbPass(strict){
  let changed=true;
  while(changed){
    changed=false;
    for(let y=0;y<rows;y++)for(let x=0;x<cols;x++)
      if(occ[y][x]===-1&&tryAbsorb(x,y,strict))changed=true;
  }
  for(const p of pieces.slice()){
    if(p.cells.length!==1)continue;
    const[x,y]=p.cells[0];
    occ[y][x]=-1;pieces.splice(pieces.indexOf(p),1);genFilled--;
    if(!tryAbsorb(x,y,strict)){pieces.push(p);occ[y][x]=p.id;genFilled++;}
  }
  total=pieces.length;
}
function attemptGenerate(){
  const cfg=DIFF[diff];cols=cfg.cols;rows=cfg.rows;
  occ=Array.from({length:rows},()=>Array(cols).fill(-1));pieces=[];genNextId=0;genFilled=0;
  const N=cols*rows,GOAL=.95;
  // long snakes first, then shorter tiers densify the gaps
  const tiers=[
    {min:Math.max(cfg.minLen,Math.round(cfg.maxLen*.45)),lo:Math.round(cfg.maxLen*.55),hi:cfg.maxLen,sweeps:3},
    {min:cfg.minLen,lo:cfg.minLen,hi:Math.round(cfg.maxLen*.45),sweeps:6},
    {min:4,lo:4,hi:Math.max(7,cfg.minLen+2),sweeps:4},
    {min:3,lo:3,hi:5,sweeps:3},
    {min:2,lo:2,hi:3,sweeps:2}
  ];
  for(let round=0;round<3&&genFilled/N<.90;round++){
    for(const t of tiers){
      let s=0;
      while(genFilled/N<GOAL&&s++<t.sweeps&&placePass(t,GOAL)){}
      if(genFilled/N>=GOAL)break;
    }
    if(genFilled/N<.92)repairPass(.95);  // repair opens space for the next round
  }
  total=pieces.length;
}
function boardScore(){
  const filled=genFilled,density=filled/(cols*rows);
  let len1=0,len2=0,longCells=0,sum=0,maxLen=0;
  for(const p of pieces){
    const L=p.cells.length;sum+=L;maxLen=Math.max(maxLen,L);
    if(L===1)len1++;if(L===2)len2++;if(L>=10)longCells+=L;
  }
  const avg=sum/(pieces.length||1);
  return density*3000+avg*18+maxLen*1.4+(longCells/(filled||1))*120-len1*120-len2*40;
}
function cloneBoard(){
  return {
    cols,rows,total,
    pieces:pieces.map(p=>({id:p.id,cells:p.cells.map(c=>[c[0],c[1]]),dir:p.dir,hx:p.hx,hy:p.hy,alive:true})),
    occ:occ.map(r=>r.slice())
  };
}
function restoreBoard(b){
  cols=b.cols;rows=b.rows;total=b.total;
  pieces=b.pieces.map(p=>({id:p.id,cells:p.cells.map(c=>[c[0],c[1]]),dir:p.dir,hx:p.hx,hy:p.hy,alive:true}));
  occ=b.occ.map(r=>r.slice());
  genNextId=pieces.reduce((m,p)=>Math.max(m,p.id),-1)+1;
  genFilled=pieces.reduce((s,p)=>s+p.cells.length,0);
}
function buildOnce(){
  attemptGenerate();
  absorbPass(true);     // strict: never strand a region repair could still fill
  repairPass(.96);
  absorbPass(false);    // final sweep: eat whatever repair couldn't reach
  mergeSingles();
  return genFilled/(cols*rows);
}
function generate(){
  // some seeds start badly; retry the full pipeline until a board clears the
  // 90% floor, keeping the best attempt as fallback
  const N=DIFF[diff].cols*DIFF[diff].rows;
  const maxTries=N>2500?2:N>1200?3:2;
  const floor=N>2500?.88:.90;           // the biggest board trades a little fill for time
  let best=null,bestFill=0;
  for(let i=0;i<maxTries;i++){
    const fill=buildOnce();
    if(fill>bestFill){bestFill=fill;best=cloneBoard();}
    if(fill>=floor)break;
  }
  restoreBoard(best);
}
function occCount(){return genFilled;}
</script>
<script>
"use strict";
const SVGNS="http://www.w3.org/2000/svg";
const store=(()=>{let ok=false;try{const k='__t';localStorage.setItem(k,'1');localStorage.removeItem(k);ok=true;}catch(e){}const mem={};
  return{get:k=>{try{return ok?localStorage.getItem(k):(mem[k]??null);}catch(e){return mem[k]??null;}},
         set:(k,v)=>{try{ok?localStorage.setItem(k,v):(mem[k]=v);}catch(e){mem[k]=v;}},
         remove:k=>{try{ok?localStorage.removeItem(k):delete mem[k];}catch(e){delete mem[k];}}};})();

const DIRS={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
const DK=Object.keys(DIRS);
const OPP={up:"down",down:"up",left:"right",right:"left"};
const DIFF={
  easy:{cols:20,rows:24,minLen:5,maxLen:26,label:"Easy"},
  medium:{cols:26,rows:32,minLen:6,maxLen:38,label:"Medium"},
  hard:{cols:32,rows:42,minLen:7,maxLen:60,label:"Hard"},
  veryHard:{cols:40,rows:54,minLen:8,maxLen:86,label:"Very Hard"},
  extreme:{cols:48,rows:64,minLen:9,maxLen:110,label:"Extreme"}
};
const SAVE_KEY='arrowout_saved_game_v5';
const MAX_STRIKES=3;
const CELL=44;          // fixed board-space cell size; zoom is handled by the SVG viewBox
// arrow look — tweak freely
const STROKE_F=0.185;   // shaft thickness as fraction of a cell
const HEAD_LEN=1.75;    // arrowhead length in stroke-widths
const HEAD_HW =1.25;    // arrowhead half-width in stroke-widths
const STUB    =0.55;    // shaft length for a single-cell arrow, in cells

let cols,rows,cell=CELL,strokeW,pieces,occ,elmap,pieceById,diff='easy';
let freed,total,strikes,running=false,animating=false,startT=0,elapsedBase=0,timerId=null;
let BW=0,BH=0,vb={x:0,y:0,w:0,h:0},fitW=0,minW=0,userZoomed=false;   // view state
const board=document.getElementById('board');
const stage=document.querySelector('.stage');
const inb=(x,y)=>x>=0&&x<cols&&y>=0&&y<rows;

/* piece is free iff head's forward ray clear of OTHER live pieces; returns gap (empty cells ahead) */
function freeInfo(p){const[dx,dy]=DIRS[p.dir];let cx=p.hx+dx,cy=p.hy+dy,gap=0;
  while(inb(cx,cy)){const o=occ[cy][cx];if(o!==-1&&o!==p.id)return{free:false,gap};gap++;cx+=dx;cy+=dy;}
  return{free:true,gap};}

/* ---------- geometry ---------- */
const ctr=(x,y)=>[x*cell+cell/2,y*cell+cell/2];
function polyLen(pts){let L=0;for(let i=1;i<pts.length;i++)L+=Math.hypot(pts[i][0]-pts[i-1][0],pts[i][1]-pts[i-1][1]);return L;}
function buildTrack(p){
  const[dx,dy]=DIRS[p.dir];
  let bc=p.cells.map(([x,y])=>ctr(x,y));            // head first
  if(bc.length===1)bc=[bc[0],[bc[0][0]-dx*cell*STUB,bc[0][1]-dy*cell*STUB]]; // stub tail
  const tailToHead=[...bc].reverse();               // tail..head
  const head=bc[0];const fwd=[];const K=cols+rows+2;
  for(let k=1;k<=K;k++)fwd.push([head[0]+dx*cell*k,head[1]+dy*cell*k]);
  const track=tailToHead.concat(fwd);
  const cum=[0];for(let i=1;i<track.length;i++)cum.push(cum[i-1]+Math.hypot(track[i][0]-track[i-1][0],track[i][1]-track[i-1][1]));
  p._t={track,cum,bodyArc:polyLen(tailToHead),total:cum[cum.length-1]};
}
function ptAt(p,a){const{track,cum,total}=p._t;a=Math.max(0,Math.min(total,a));
  for(let i=1;i<cum.length;i++){if(cum[i]>=a){const t=(a-cum[i-1])/((cum[i]-cum[i-1])||1);
    return[track[i-1][0]+(track[i][0]-track[i-1][0])*t,track[i-1][1]+(track[i][1]-track[i-1][1])*t];}}
  return track[track.length-1];}
function windowPts(p,ws,we){const{track,cum,total}=p._t;
  ws=Math.max(0,Math.min(total,ws));we=Math.max(0,Math.min(total,we));
  const pts=[ptAt(p,ws)];for(let i=0;i<cum.length;i++)if(cum[i]>ws&&cum[i]<we)pts.push(track[i]);pts.push(ptAt(p,we));return pts;}
const polyD=pts=>pts.map((q,i)=>(i?'L':'M')+q[0].toFixed(1)+' '+q[1].toFixed(1)).join(' ');
function chevronD(tip,dir){const[dx,dy]=DIRS[dir];const hl=strokeW*HEAD_LEN,hw=strokeW*HEAD_HW;
  const bx=tip[0]-dx*hl,by=tip[1]-dy*hl,nx=-dy,ny=dx;
  const l=[bx+nx*hw,by+ny*hw],r=[bx-nx*hw,by-ny*hw];
  return`M${l[0].toFixed(1)} ${l[1].toFixed(1)} L${tip[0].toFixed(1)} ${tip[1].toFixed(1)} L${r[0].toFixed(1)} ${r[1].toFixed(1)}`;}
function drawPiece(p,s){const we=p._t.bodyArc+s,ws=we-p._t.bodyArc;
  const bodyWe=Math.max(ws+0.1,we-strokeW*0.7);          // stop shaft just short of the tip
  const d=polyD(windowPts(p,ws,bodyWe));const tip=ptAt(p,we);
  const e=elmap.get(p.id);e.body.setAttribute('d',d);e.hit.setAttribute('d',polyD(windowPts(p,ws,we)));
  e.head.setAttribute('d',chevronD(tip,p.dir));}

/* ---------- render ---------- */
function render(){
  BW=cols*cell;BH=rows*cell;
  while(board.firstChild)board.removeChild(board.firstChild);
  elmap=new Map();pieceById=new Map();
  strokeW=Math.max(3,cell*STROKE_F);const sw=strokeW;
  const gBody=document.createElementNS(SVGNS,'g'),gHit=document.createElementNS(SVGNS,'g');
  for(const p of pieces){
    if(!p.alive)continue;buildTrack(p);pieceById.set(p.id,p);
    const g=document.createElementNS(SVGNS,'g');g.dataset.id=p.id;
    const body=document.createElementNS(SVGNS,'path');body.setAttribute('class','body');body.style.strokeWidth=sw;
    const head=document.createElementNS(SVGNS,'path');head.setAttribute('class','head');head.style.strokeWidth=sw;
    g.appendChild(body);g.appendChild(head);gBody.appendChild(g);
    const hit=document.createElementNS(SVGNS,'path');hit.setAttribute('class','hit');hit.style.strokeWidth=cell*0.82;
    hit.dataset.id=p.id;gHit.appendChild(hit);
    elmap.set(p.id,{g,body,head,hit});
    drawPiece(p,0);
  }
  board.appendChild(gBody);board.appendChild(gHit);
  if(!vb.w){vb={x:0,y:0,w:BW,h:BH};}
  board.setAttribute('viewBox',`0 0 ${BW} ${BH}`);
}

/* ---------- zoom & pan (SVG viewBox) ---------- */
const rectOf=()=>board.getBoundingClientRect();
const aspect=()=>{const r=rectOf();return (r.width>0&&r.height>0)?r.width/r.height:0.6;};
const applyView=()=>board.setAttribute('viewBox',`${vb.x.toFixed(2)} ${vb.y.toFixed(2)} ${vb.w.toFixed(2)} ${vb.h.toFixed(2)}`);
function calcFitW(){const a=aspect(),pad=1.06;return (BW/BH>=a)?BW*pad:(BH*pad)*a;}
function fitView(){const a=aspect();fitW=calcFitW();minW=Math.min(fitW,6.5*cell);
  vb.w=fitW;vb.h=vb.w/a;vb.x=(BW-vb.w)/2;vb.y=(BH-vb.h)/2;userZoomed=false;applyView();}
function clampView(){const a=aspect();
  vb.w=Math.max(minW,Math.min(fitW,vb.w));vb.h=vb.w/a;
  vb.x=(vb.w>=BW)?(BW-vb.w)/2:Math.max(0,Math.min(BW-vb.w,vb.x));
  vb.y=(vb.h>=BH)?(BH-vb.h)/2:Math.max(0,Math.min(BH-vb.h,vb.y));
  applyView();}
const bX=sx=>{const r=rectOf();return vb.x+(sx-r.left)*vb.w/r.width;};
const bY=sy=>{const r=rectOf();return vb.y+(sy-r.top)*vb.h/r.height;};
function panKeep(p,sx,sy){const r=rectOf();vb.x=p.x-(sx-r.left)*vb.w/r.width;vb.y=p.y-(sy-r.top)*vb.h/r.height;}
function zoomAt(f,sx,sy){const p={x:bX(sx),y:bY(sy)};vb.w=Math.max(minW,Math.min(fitW,vb.w/f));vb.h=vb.w/aspect();
  panKeep(p,sx,sy);userZoomed=true;hideHint();clampView();}
function zoomCenter(f){const r=rectOf();zoomAt(f,r.left+r.width/2,r.top+r.height/2);}
let hintGone=false;function hideHint(){if(hintGone)return;hintGone=true;const h=document.getElementById('zhint');if(h)h.style.opacity='0';}

const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const gp=new Map();let grab=null,tap=null,pinch=null,lastTap=0,lastXY=null;
function handleTap(sx,sy){
  const now=performance.now();
  if(now-lastTap<300&&lastXY&&Math.hypot(sx-lastXY.x,sy-lastXY.y)<32){   // double-tap toggles zoom
    lastTap=0;hideHint();(vb.w>fitW*0.7)?zoomAt(2.4,sx,sy):fitView();return;}
  lastTap=now;lastXY={x:sx,y:sy};
  if(!running||animating)return;
  const el=document.elementFromPoint(sx,sy);const id=el&&el.dataset?el.dataset.id:null;
  if(id!=null&&pieceById.has(+id))onClick(pieceById.get(+id));
}
/* Gestures are bound to the plain .stage div, not the SVG: SVG pointer capture is
   unreliable on iOS Safari (implicit touch capture goes to the child path under the
   finger), which silently killed one-finger panning. On a div, capture just works. */
stage.addEventListener('pointerdown',e=>{
  try{stage.setPointerCapture(e.pointerId);}catch(_){}
  gp.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(gp.size===1){grab={x:bX(e.clientX),y:bY(e.clientY)};tap={x:e.clientX,y:e.clientY,t:performance.now(),moved:false};pinch=null;}
  else if(gp.size===2){const[a,b]=[...gp.values()];
    pinch={d:dist(a,b),mx:(a.x+b.x)/2,my:(a.y+b.y)/2};tap=null;grab=null;hideHint();}
});
stage.addEventListener('pointermove',e=>{
  if(!gp.has(e.pointerId))return;gp.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(gp.size>=2&&pinch){const[a,b]=[...gp.values()];
    const nd=dist(a,b),mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
    // two-finger pan: translate by midpoint movement, then zoom around the midpoint
    const r=rectOf();vb.x-=(mx-pinch.mx)*vb.w/r.width;vb.y-=(my-pinch.my)*vb.h/r.height;
    if(pinch.d>0)zoomAt(nd/pinch.d,mx,my);else clampView();
    pinch.d=nd;pinch.mx=mx;pinch.my=my;return;}
  if(gp.size===1&&grab){if(tap&&Math.hypot(e.clientX-tap.x,e.clientY-tap.y)>8){tap.moved=true;hideHint();}
    panKeep(grab,e.clientX,e.clientY);clampView();}
});
function endPtr(e){
  const wasTap=gp.size===1&&tap&&!tap.moved&&(performance.now()-tap.t<500);
  const tx=tap?tap.x:e.clientX,ty=tap?tap.y:e.clientY;
  gp.delete(e.pointerId);
  if(wasTap)handleTap(tx,ty);
  if(gp.size===1){const o=[...gp.values()][0];grab={x:bX(o.x),y:bY(o.y)};tap=null;pinch=null;}
  else if(gp.size===0){grab=null;tap=null;pinch=null;}
  else if(gp.size>=2){const[a,b]=[...gp.values()];pinch={d:dist(a,b),mx:(a.x+b.x)/2,my:(a.y+b.y)/2};}
}
stage.addEventListener('pointerup',endPtr);
stage.addEventListener('pointercancel',endPtr);
stage.addEventListener('lostpointercapture',e=>{if(gp.has(e.pointerId)){gp.delete(e.pointerId);if(!gp.size){grab=null;tap=null;pinch=null;}}});
stage.addEventListener('wheel',e=>{e.preventDefault();zoomAt(e.deltaY<0?1.12:1/1.12,e.clientX,e.clientY);},{passive:false});
document.getElementById('zin').addEventListener('click',()=>zoomCenter(1.45));
document.getElementById('zout').addEventListener('click',()=>zoomCenter(1/1.45));
document.getElementById('zfit').addEventListener('click',fitView);

/* ---------- animation ---------- */
const easeOut=t=>1-Math.pow(1-t,2.2);
const reduce=()=>matchMedia('(prefers-reduced-motion: reduce)').matches;
function animate(dur,step,done){const t0=performance.now();
  (function frame(now){let t=Math.min(1,(now-t0)/dur);step(t);if(t<1)requestAnimationFrame(frame);else done&&done();})(performance.now());}

function onClick(p){
  if(!running||animating||!p.alive)return;
  if(!startT)startTimer();
  const info=freeInfo(p);
  if(info.free){
    for(const[x,y]of p.cells)occ[y][x]=-1;   // vacate immediately for others
    p.alive=false;animating=true;
    const el=elmap.get(p.id);el.g.classList.add('free');el.hit.style.pointerEvents='none';
    const dist=p._t.total-p._t.bodyArc;
    if(reduce()){el.g.remove();el.hit.remove();animating=false;afterFree();return;}
    const dur=Math.max(240,Math.min(620,dist*7));
    animate(dur,t=>drawPiece(p,easeOut(t)*(p._t.total+2)),()=>{el.g.remove();el.hit.remove();animating=false;afterFree();});
  }else{
    strikes++;drawDrops();animating=true;
    const el=elmap.get(p.id);const adv=info.gap*cell+cell*0.34;
    if(reduce()){el.g.classList.add('crash');setTimeout(()=>el.g.classList.remove('crash'),420);animating=false;afterStrike();return;}
    animate(150,t=>drawPiece(p,easeOut(t)*adv),()=>{
      el.g.classList.add('crash');
      animate(230,t=>drawPiece(p,adv*(1-t)),()=>{
        setTimeout(()=>el.g.classList.remove('crash'),160);animating=false;afterStrike();});
    });
  }
}
function afterFree(){freed++;updateHUD();if(freed>=total)win();else saveProgress();}
function afterStrike(){if(strikes>=MAX_STRIKES)lose();else saveProgress();}

/* ---------- hud / timer ---------- */
function drawDrops(){const d=document.getElementById('drops');d.innerHTML='';
  for(let i=0;i<MAX_STRIKES;i++){const spent=i<strikes;const w=document.createElement('div');w.className='drop';
    w.innerHTML=`<svg viewBox="0 0 24 24"><path d="M12 21 C12 21 3 14.5 3 8.6 A4.6 4.6 0 0 1 12 6 A4.6 4.6 0 0 1 21 8.6 C21 14.5 12 21 12 21 Z" fill="${spent?'var(--drop-empty)':'var(--drop)'}"/></svg>`;
    d.appendChild(w);}}
function updateHUD(){const pct=total?Math.round(100*freed/total):0;
  document.getElementById('pct').textContent=pct+'%';document.getElementById('fill').style.width=pct+'%';
  document.getElementById('freed').textContent=freed;document.getElementById('total').textContent=total;}
function fmt(ms){const s=Math.floor(ms/1000);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function currentElapsed(){return elapsedBase+(startT?performance.now()-startT:0);}
function paintTime(){document.getElementById('time').textContent=fmt(currentElapsed());}
function startTimer(){if(timerId)return;startT=performance.now();timerId=setInterval(paintTime,250);paintTime();}
function pauseTimer(){elapsedBase=currentElapsed();startT=0;if(timerId){clearInterval(timerId);timerId=null;}paintTime();}
function stopTimer(){pauseTimer();}
function bestKey(){return'arrowout_best_'+diff;}
function showBest(){const b=store.get(bestKey());document.getElementById('best').textContent=b?fmt(Number(b)):'—';}

/* ---------- end states ---------- */
function win(){const el=currentElapsed();running=false;stopTimer();clearProgress();
  const s=Math.max(1,3-strikes);const prev=store.get(bestKey());const isBest=el>0&&(!prev||el<Number(prev));
  if(isBest)store.set(bestKey(),String(Math.round(el)));showBest();
  overlay('win','Solved!','★★★'.slice(0,s)+'☆☆☆'.slice(0,3-s),
    `${fmt(el)} · ${strikes} strike${strikes===1?'':'s'}${isBest?' · new best!':''}`);}
function lose(){running=false;stopTimer();clearProgress();overlay('lose','Out of tries','',`You freed ${freed} of ${total}. Read the free arrows first.`);}
function overlay(kind,title,stars,text){document.getElementById('ovTitle').textContent=title;
  document.getElementById('ovTitle').className=kind;document.getElementById('ovStars').textContent=stars;
  document.getElementById('ovText').textContent=text;document.getElementById('overlay').classList.add('show');}

/* ---------- lifecycle ---------- */
let savedPieces=null;
function snapshot(){savedPieces=pieces.map(p=>({id:p.id,dir:p.dir,hx:p.hx,hy:p.hy,cells:p.cells.map(c=>[c[0],c[1]])}));}
function clearProgress(){store.remove(SAVE_KEY);}
function saveProgress(){
  if(!running||!pieces||!savedPieces||!total)return;
  const data={
    v:2,diff,freed,total,strikes,elapsedMs:Math.round(currentElapsed()),
    pieces:pieces.map(p=>({id:p.id,dir:p.dir,hx:p.hx,hy:p.hy,alive:!!p.alive,cells:p.cells.map(c=>[c[0],c[1]])})),
    savedPieces:savedPieces.map(p=>({id:p.id,dir:p.dir,hx:p.hx,hy:p.hy,cells:p.cells.map(c=>[c[0],c[1]])}))
  };
  store.set(SAVE_KEY,JSON.stringify(data));
}
function restoreSaved(){
  const cfg=DIFF[diff];cols=cfg.cols;rows=cfg.rows;
  occ=Array.from({length:rows},()=>Array(cols).fill(-1));
  pieces=savedPieces.map(p=>({id:p.id,dir:p.dir,hx:p.hx,hy:p.hy,cells:p.cells.map(c=>[c[0],c[1]]),alive:true}));
  for(const p of pieces)for(const[x,y]of p.cells)occ[y][x]=p.id;
  total=pieces.length;
}
function rebuildOcc(){
  occ=Array.from({length:rows},()=>Array(cols).fill(-1));
  for(const p of pieces)if(p.alive)for(const[x,y]of p.cells)occ[y][x]=p.id;
}
function syncDifficultyUI(){
  document.getElementById('diffLabel').textContent=DIFF[diff].label;
  const sel=document.getElementById('diffSelect');if(sel)sel.value=diff;
}
function startPlay(opts={}){
  freed=opts.freed??0;strikes=opts.strikes??0;elapsedBase=opts.elapsedMs??0;startT=0;running=true;
  paintTime();
  drawDrops();updateHUD();showBest();
  gp.clear();grab=tap=pinch=null;vb.w=0;
  render();
  requestAnimationFrame(fitView);
}
function loadProgress(){
  const raw=store.get(SAVE_KEY);if(!raw)return false;
  try{
    const data=JSON.parse(raw);
    if(!data||data.v!==2||!DIFF[data.diff]||!Array.isArray(data.pieces)||!Array.isArray(data.savedPieces))throw new Error('bad save');
    diff=data.diff;const cfg=DIFF[diff];cols=cfg.cols;rows=cfg.rows;
    pieces=data.pieces.map(p=>({id:p.id,dir:p.dir,hx:p.hx,hy:p.hy,alive:p.alive!==false,cells:p.cells.map(c=>[c[0],c[1]])}));
    savedPieces=data.savedPieces.map(p=>({id:p.id,dir:p.dir,hx:p.hx,hy:p.hy,cells:p.cells.map(c=>[c[0],c[1]])}));
    total=data.total||pieces.length;freed=data.freed??pieces.filter(p=>!p.alive).length;strikes=data.strikes??0;
    rebuildOcc();syncDifficultyUI();startPlay({freed,strikes,elapsedMs:data.elapsedMs||0});return true;
  }catch(e){clearProgress();return false;}
}
/* Board generation runs in an inline Web Worker so 4-8s Very Hard/Extreme builds
   never block the main thread: the spinner stays smooth and the page stays responsive.
   The worker source is the non-executing #genSrc script plus an injected prelude,
   so there is exactly one copy of the generation code to maintain. */
const genBlobUrl=(()=>{
  const src=document.getElementById('genSrc').textContent;
  const prelude=`const DIRS=${JSON.stringify(DIRS)};const DK=${JSON.stringify(DK)};`+
    `const OPP=${JSON.stringify(OPP)};const DIFF=${JSON.stringify(DIFF)};`+
    `let cols=0,rows=0,occ=null,pieces=[],diff='easy',total=0;`+
    `const inb=(x,y)=>x>=0&&x<cols&&y>=0&&y<rows;`;
  const harness=`onmessage=e=>{diff=e.data.diff;let tries=0;`+
    `do{generate();tries++;}while(tries<4&&total<8);`+
    `postMessage({pieces,occ,total,cols,rows});};`;
  return URL.createObjectURL(new Blob([prelude+'\n'+src+'\n'+harness],{type:'text/javascript'}));
})();
let genWorker=null;
function newLevel(){
  document.getElementById('overlay').classList.remove('show');animating=false;clearProgress();syncDifficultyUI();
  const busy=document.getElementById('busy');
  busy.classList.add('show');
  if(genWorker)genWorker.terminate();            // difficulty changed mid-build: honor the new choice
  genWorker=new Worker(genBlobUrl);
  genWorker.onmessage=e=>{
    genWorker.terminate();genWorker=null;
    ({total,cols,rows}=e.data);
    pieces=e.data.pieces;occ=e.data.occ;
    snapshot();
    startPlay();
    saveProgress();
    busy.classList.remove('show');
  };
  genWorker.onerror=err=>{
    console.error('generation worker failed',err);
    genWorker.terminate();genWorker=null;
    busy.classList.remove('show');
  };
  genWorker.postMessage({diff});
}
function restartSame(){                          // replay the identical board (used after 3 strikes)
  if(!savedPieces){newLevel();return;}
  document.getElementById('overlay').classList.remove('show');animating=false;clearProgress();
  restoreSaved();
  startPlay();
  saveProgress();
}
function hint(){if(!running||animating)return;
  for(const p of pieces){if(p.alive&&freeInfo(p).free){const g=elmap.get(p.id).g;g.classList.add('hl');setTimeout(()=>g.classList.remove('hl'),1000);}}}

document.getElementById('diffSelect').addEventListener('change',e=>{diff=e.target.value;stopTimer();newLevel();});
document.getElementById('newBtn').addEventListener('click',()=>{stopTimer();newLevel();});
document.getElementById('ovNext').addEventListener('click',()=>{stopTimer();newLevel();});
document.getElementById('ovRetry').addEventListener('click',()=>{stopTimer();restartSame();});
document.getElementById('hintBtn').addEventListener('click',hint);
let rt;addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>{
  if(!vb.w)return;
  if(userZoomed){fitW=calcFitW();minW=Math.min(fitW,6.5*cell);clampView();}else fitView();
},150);});
addEventListener('pagehide',saveProgress);
addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')saveProgress();});
if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
if(!loadProgress())newLevel();
</script>
